<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi cuenta — Espacio Vuela</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --coral: #ff4e68; --magenta: #ff008d; --cyan: #00c8d4;
      --purple: #8b6aff; --yellow: #fecb29; --dark: #111111;
      --gray: #555; --light: #f5f5f7; --border: rgba(0,0,0,0.08);
    }
    body { font-family: 'Outfit', sans-serif; background: #f7f7f9; color: var(--dark); min-height: 100vh; }

    .logo { font-family: 'Dancing Script', cursive; font-size: 26px; color: var(--coral); text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-nombre { font-size: 14px; color: var(--gray); }
    .nav-nombre span { font-weight: 600; color: var(--dark); }
    .btn-salir {
      font-size: 13px; color: var(--gray); background: none;
      border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 14px;
      cursor: pointer; font-family: 'Outfit', sans-serif; transition: color .2s, border-color .2s;
    }
    .btn-salir:hover { color: var(--coral); border-color: var(--coral); }

    .alerta {
      display: none; padding: 14px 40px; font-size: 14px; font-weight: 500;
      align-items: center; gap: 10px;
    }
    .alerta.sin-plan { background: rgba(255,78,104,.08); color: #c0002a; border-bottom: 1px solid rgba(255,78,104,.15); display: flex; }
    .alerta.pocas-clases { background: rgba(254,203,41,.12); color: #7a5800; border-bottom: 1px solid rgba(254,203,41,.3); display: flex; }
    .alerta a { color: inherit; font-weight: 700; text-decoration: underline; cursor: pointer; }

    main { max-width: 1100px; margin: 0 auto; padding: 36px 24px 60px; }
    .bienvenida { margin-bottom: 28px; }
    .bienvenida h1 { font-family: 'Dancing Script', cursive; font-size: 38px; line-height: 1.1; }
    .bienvenida h1 span { background: linear-gradient(135deg, var(--coral), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .bienvenida p { font-size: 15px; color: var(--gray); margin-top: 6px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .col-left { display: flex; flex-direction: column; gap: 20px; }
    .col-right { display: flex; flex-direction: column; gap: 20px; }

    .card { background: #fff; border-radius: 20px; padding: 28px; border: 1px solid var(--border); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .card-titulo { font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); }
    .card-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .badge-activo { background: rgba(0,200,212,.1); color: #007a82; }
    .badge-vencido { background: rgba(255,78,104,.1); color: var(--coral); }
    .badge-congelado { background: rgba(139,106,255,.1); color: var(--purple); }
    .badge-sin-plan { background: var(--light); color: var(--gray); }

    .plan-nombre { font-size: 22px; font-weight: 700; margin-bottom: 18px; }
    .plan-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat { background: var(--light); border-radius: 14px; padding: 14px 12px; text-align: center; }
    .stat-valor { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .stat-valor.coral { color: var(--coral); }
    .stat-valor.cyan { color: var(--cyan); }
    .stat-valor.gray { color: var(--gray); }
    .stat-valor.ilimitado { font-size: 20px; }
    .stat-label { font-size: 11px; color: var(--gray); font-weight: 500; }
    .plan-vencimiento { font-size: 13px; color: var(--gray); background: var(--light); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
    .plan-vencimiento.urgente { background: rgba(255,78,104,.06); color: #c0002a; }
    .plan-addon { margin-top: 10px; font-size: 12px; color: var(--purple); background: rgba(139,106,255,.08); border-radius: 8px; padding: 8px 12px; font-weight: 500; }

    .sin-plan-box { text-align: center; padding: 20px 0; }
    .sin-plan-box .icon { font-size: 40px; margin-bottom: 12px; }
    .sin-plan-box p { font-size: 14px; color: var(--gray); margin-bottom: 16px; line-height: 1.5; }

    .btn-primary {
      display: inline-block; padding: 13px 22px;
      background: linear-gradient(135deg, var(--coral), var(--magenta));
      color: white; border: none; border-radius: 12px;
      font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: transform .2s, box-shadow .2s; text-align: center;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,78,104,.35); }
    .btn-full { width: 100%; display: block; }

    .clase-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .clase-item:last-child { border-bottom: none; padding-bottom: 0; }
    .clase-fecha-box { min-width: 46px; text-align: center; background: var(--light); border-radius: 12px; padding: 8px 6px; }
    .clase-dia { font-size: 20px; font-weight: 700; line-height: 1; color: var(--coral); }
    .clase-mes { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--gray); letter-spacing: 1px; }
    .clase-info { flex: 1; min-width: 0; }
    .clase-nombre { font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .clase-detalle { font-size: 12px; color: var(--gray); }

    .sin-clases { text-align: center; padding: 20px 0; color: var(--gray); font-size: 14px; }
    .sin-clases .icon { font-size: 32px; display: block; margin-bottom: 8px; }

    .rutina-fecha { font-size: 12px; color: var(--gray); margin-bottom: 14px; }
    .rutina-titulo { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    .rutina-contenido { font-size: 14px; color: #444; line-height: 1.7; white-space: pre-wrap; }
    .sin-rutina { text-align: center; padding: 16px 0; color: var(--gray); font-size: 14px; }
    .sin-rutina .icon { font-size: 32px; display: block; margin-bottom: 8px; }
    .rutina-clase-titulo { font-size:15px; font-weight:700; color:var(--dark); margin-bottom:12px; }
    .rutina-seccion { margin-bottom:14px; padding:10px 14px; background:#f7f7f9; border-radius:10px; }
    .rutina-seccion-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--gray); margin-bottom:4px; }
    .rutina-seccion-valor { font-size:13px; color:var(--dark); line-height:1.6; white-space:pre-wrap; }
    .rutina-seccion-valor a { color:var(--coral); text-decoration:none; }
    .rutina-seccion-valor a:hover { text-decoration:underline; }
    .rutina-nivel { display:inline-block; padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; background:rgba(139,106,255,.1); color:var(--purple); margin-bottom:10px; }
    .rutina-clase-selector { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .rutina-clase-btn { padding:5px 12px; border-radius:8px; border:1.5px solid var(--border); background:#fff; font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; }
    .rutina-clase-btn.active { background:var(--coral); color:#fff; border-color:var(--coral); }


    .acciones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .accion-btn {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 18px 12px; background: var(--light); border-radius: 14px;
      border: none; cursor: pointer; font-family: 'Outfit', sans-serif;
      text-decoration: none; transition: background .2s, transform .15s;
    }
    .accion-btn:hover { background: #ebebee; transform: translateY(-2px); }
    .accion-icon { font-size: 24px; }
    .accion-label { font-size: 12px; font-weight: 600; color: var(--dark); text-align: center; }

    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 768px) {
      .nav-nombre { display: none; }
      .alerta { padding: 12px 20px; font-size: 13px; }
      main { padding: 24px 16px 48px; }
      .bienvenida h1 { font-size: 30px; }
      .grid { grid-template-columns: 1fr; }
      .acciones-grid { grid-template-columns: 1fr 1fr; }
      .bienvenida { padding: 0; }
    }
</style>
</head>
<body>


<div class="alerta" id="alerta-sin-plan">
  ⚠️ No tienes un plan activo. <a href="planes.html">Ver planes disponibles →</a>
</div>
<div class="alerta pocas-clases" id="alerta-pocas" style="display:none;">
  💛 Te quedan pocas clases. <a href="planes.html">Renueva tu plan →</a>
</div>

<main>
  <div class="bienvenida">
    <h1>¡Hola, <span id="bienvenida-nombre">...</span>!</h1>
    <p id="bienvenida-sub">Cargando tu información...</p>
  </div>

  <div class="grid">
    <div class="col-left">
      <div class="card">
        <div class="card-header">
          <div class="card-titulo">Tu plan activo</div>
          <div class="card-badge badge-sin-plan" id="plan-badge">—</div>
        </div>
        <div id="plan-contenido">
          <div class="skeleton" style="height:28px; width:60%; margin-bottom:18px;"></div>
          <div class="plan-stats">
            <div class="stat"><div class="skeleton" style="height:34px; margin-bottom:6px;"></div><div class="skeleton" style="height:12px;"></div></div>
            <div class="stat"><div class="skeleton" style="height:34px; margin-bottom:6px;"></div><div class="skeleton" style="height:12px;"></div></div>
            <div class="stat"><div class="skeleton" style="height:34px; margin-bottom:6px;"></div><div class="skeleton" style="height:12px;"></div></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-titulo">Próximas clases</div>
          <a href="agendar.html" class="btn-primary" style="font-size:12px; padding:8px 14px;">+ Agendar</a>
        </div>
        <div id="clases-contenido">
          <div class="skeleton" style="height:60px; margin-bottom:10px; border-radius:12px;"></div>
          <div class="skeleton" style="height:60px; border-radius:12px;"></div>
        </div>
      </div>
    </div>

    <div class="col-right">
      <div class="card">
        <div class="card-header">
          <div class="card-titulo">Próximas rutinas</div>
          <div style="font-size:20px;">🏃‍♀️</div>
        </div>
        <div id="rutina-contenido">
          <div class="skeleton" style="height:16px; width:40%; margin-bottom:14px;"></div>
          <div class="skeleton" style="height:20px; width:70%; margin-bottom:10px;"></div>
          <div class="skeleton" style="height:80px;"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-titulo">Acciones rápidas</div>
        </div>
        <div class="acciones-grid">
          <a href="calendario.html" class="accion-btn"><span class="accion-icon">📅</span><span class="accion-label">Agendar clase</span></a>
          <a href="planes.html" class="accion-btn"><span class="accion-icon">💳</span><span class="accion-label">Ver planes</span></a>
          <a href="mis-clases.html" class="accion-btn"><span class="accion-icon">📋</span><span class="accion-label">Mis clases</span></a>
          <a href="https://wa.me/56973841513" target="_blank" class="accion-btn"><span class="accion-icon">💬</span><span class="accion-label">WhatsApp</span></a>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://mcmdsntnbgsmdraeitgt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_dBivnUgV8EeaoSH9EJVQPQ_d692xRQq';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function formatFecha(dateStr) {
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('es-CL', { day: '2-digit', month: 'short', year: 'numeric' });
  }
  function diasHasta(fechaStr) {
    const fin  = new Date(fechaStr + 'T23:59:59');
    const hoy  = new Date();
    return Math.ceil((fin - hoy) / (1000 * 60 * 60 * 24));
  }
  function nombreMes(date) { return new Date(date).toLocaleDateString('es-CL', { month: 'short' }).toUpperCase(); }
  function dia(date)        { return new Date(date).getDate(); }
  function horaMinutos(date){ return new Date(date).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false }); }

  let userId = null;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    userId = session.user.id;
    await initServerTime();
    // Cargar usuario primero para detectar rol
    await cargarUsuario(userId);
    // Solo cargar plan y clases si es alumna
    const { data: rolCheck } = await sb.from('usuarios').select('rol,nombre,apellido').eq('id', userId).single();
    if (rolCheck?.rol === 'alumna' || !rolCheck?.rol) {
      await Promise.all([cargarPlan(userId), cargarClases(userId), cargarRutina(userId)]);
    } else if (rolCheck?.rol === 'profesora') {
      const nombreCompleto = ((rolCheck.nombre||'') + ' ' + (rolCheck.apellido||'')).trim();
      await Promise.all([cargarClasesProfesora(nombreCompleto), cargarRutinasProfesora(nombreCompleto)]);
    }
  }

  async function cargarUsuario(userId) {
    const { data: u } = await sb.from('usuarios').select('nombre, apellido, rol').eq('id', userId).single();
    if (!u) return;
    
    // Si es admin o profesora, redirigir
    if (u.rol === 'admin') {
      window.location.href = 'admin.html';
      return;
    }
    if (u.rol === 'profesora') {
      adaptarVistaProfesora(u);
    }
    
    const nombre = u.nombre || 'alumna';
    const navNombre = document.getElementById('nav-nombre');
    if (navNombre) navNombre.textContent = nombre;
    const bienvenidaNombre = document.getElementById('bienvenida-nombre');
    if (bienvenidaNombre) bienvenidaNombre.textContent = nombre;
    const hora = new Date().getHours();
    const saludo = hora < 12 ? 'Buenos días' : hora < 19 ? 'Buenas tardes' : 'Buenas noches';
    document.getElementById('bienvenida-sub').textContent = saludo + ' — ' + new Date().toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  async function cargarPlan(userId) {
    const hoy = serverDate();
    const { data: compras } = await sb
      .from('compras')
      .select('*, planes(nombre, tipo)')
      .eq('alumna_id', userId)
      .in('estado', ['activo', 'congelado'])
      .order('created_at', { ascending: false });

    const contenedor = document.getElementById('plan-contenido');
    const badge      = document.getElementById('plan-badge');

    if (!compras || compras.length === 0) { mostrarSinPlan(contenedor, badge); return; }

    const c = compras[0];

    // Vencimiento inmediato: clases agotadas O fecha expirada → lo primero que ocurra
    if (c.estado === 'activo') {
      const clasesAgotadas = !c.ilimitado && c.clases_disponibles !== null && c.clases_disponibles <= 0;
      const vencidoPorFecha = c.fecha_fin < hoy;
      if (clasesAgotadas || vencidoPorFecha) {
        await sb.from('compras').update({ estado: 'vencido' }).eq('id', c.id);
        mostrarSinPlan(contenedor, badge);
        return;
      }
    }

    const dias = diasHasta(c.fecha_fin);
    const urgente = dias <= 5;

    // Badge
    if (c.estado === 'congelado') {
      badge.textContent = '❄️ Congelado'; badge.className = 'card-badge badge-congelado';
    } else {
      badge.textContent = 'Activo'; badge.className = 'card-badge badge-activo';
    }

    // Alertas
    if (c.estado === 'congelado') {
      const alertaCongelado = document.getElementById('alerta-sin-plan');
      alertaCongelado.className = 'alerta congelado';
      alertaCongelado.innerHTML = '❄️ Tu plan está congelado. Contacta a Espacio Vuela para reactivarlo.';
      alertaCongelado.style.display = 'flex';
    } else if (!c.ilimitado && c.clases_disponibles !== null && c.clases_disponibles > 0 && c.clases_disponibles <= 2) {
      document.getElementById('alerta-pocas').style.display = 'flex';
    }

    const nombrePlan = c.planes?.nombre || 'Plan activo';

    contenedor.innerHTML = `
      <div class="plan-nombre">${nombrePlan}</div>
      <div class="plan-stats">
        <div class="stat">
          <div class="stat-valor coral ${c.ilimitado ? 'ilimitado' : ''}">${c.ilimitado ? '∞' : (c.clases_disponibles ?? '—')}</div>
          <div class="stat-label">Disponibles</div>
        </div>
        <div class="stat">
          <div class="stat-valor cyan">${c.clases_usadas ?? 0}</div>
          <div class="stat-label">Usadas</div>
        </div>
        <div class="stat">
          <div class="stat-valor gray">${dias}</div>
          <div class="stat-label">Días restantes</div>
        </div>
      </div>
      <div class="plan-vencimiento ${urgente ? 'urgente' : ''}">
        ${urgente ? '⚠️' : '📅'} Vence el ${formatFecha(c.fecha_fin)}
        ${c.estado === 'congelado' ? ' · <strong>Plan congelado</strong>' : ''}
      </div>
      ${(c.addon_gym || c.incluye_gym) ? '<div class="plan-addon">🏋️ Addon Gym incluido</div>' : ''}
    `;
  }

  function mostrarSinPlan(contenedor, badge) {
    document.getElementById('alerta-sin-plan').className = 'alerta sin-plan';
    badge.textContent = 'Sin plan'; badge.className = 'card-badge badge-sin-plan';
    contenedor.innerHTML = `
      <div class="sin-plan-box">
        <div class="icon">🌟</div>
        <p>Aún no tienes un plan activo.<br>Elige el que más se ajuste a ti.</p>
        <a href="planes.html" class="btn-primary btn-full">Ver planes disponibles →</a>
      </div>`;
  }

  async function cargarClases(userId) {
    const { data: todas } = await sb
      .from('inscripciones')
      .select('*, clases(nombre, fecha_hora, profesora, tipo)')
      .eq('alumna_id', userId)
      .eq('estado', 'confirmada');

    const ahora = serverNow();
    const inscripciones = (todas || [])
      .filter(i => i.clases && new Date(i.clases.fecha_hora) >= ahora)
      .sort((a, b) => new Date(a.clases.fecha_hora) - new Date(b.clases.fecha_hora))
      .slice(0, 5);

    const contenedor = document.getElementById('clases-contenido');
    if (!inscripciones || inscripciones.length === 0) {
      contenedor.innerHTML = `
        <div class="sin-clases"><span class="icon">📭</span>No tienes clases agendadas próximamente.</div>
        <a href="agendar.html" class="btn-primary btn-full" style="margin-top:16px;">Agendar mi primera clase →</a>`;
      return;
    }
    contenedor.innerHTML = inscripciones.map(ins => {
      const c = ins.clases;
      return `<div class="clase-item">
        <div class="clase-fecha-box">
          <div class="clase-dia">${dia(c.fecha_hora)}</div>
          <div class="clase-mes">${nombreMes(c.fecha_hora)}</div>
        </div>
        <div class="clase-info">
          <div class="clase-nombre">${c.nombre || c.tipo || 'Clase'}</div>
          <div class="clase-detalle">${horaMinutos(c.fecha_hora)} · ${c.profesora || 'Por confirmar'}</div>
        </div>
      </div>`;
    }).join('');
  }

  async function cargarRutina() {
    const contenedor = document.getElementById('rutina-contenido');
    const ahora = serverNow();
    const en144h = new Date(ahora.getTime() + 144*60*60*1000);

    // Obtener clases próximas 144h en que está inscrita la alumna
    const { data: inscripciones } = await sb
      .from('inscripciones')
      .select('clase_id, clases(id, nombre, fecha_hora)')
      .eq('alumna_id', userId)
      .eq('estado', 'confirmada')
      .gte('clases.fecha_hora', ahora.toISOString())
      .lte('clases.fecha_hora', en144h.toISOString());

    const clasesProximas = (inscripciones || [])
      .filter(i => i.clases)
      .map(i => i.clases)
      .sort((a,b) => new Date(a.fecha_hora) - new Date(b.fecha_hora));

    // Compatibilidad: mantener clasesHoy para el resto de la función
    const clasesHoy = clasesProximas;

    if (!clasesHoy.length) {
      contenedor.innerHTML = `<div class="sin-rutina"><span class="icon">🌸</span>No tienes clases agendadas en los próximos 6 días.</div>`;
      return;
    }

    // Obtener rutinas para esas clases
    const claseIds = clasesHoy.map(c => c.id);
    const { data: rutinas } = await sb
      .from('rutinas')
      .select('*')
      .in('clase_id', claseIds);

    const rutinaMap = {};
    (rutinas || []).forEach(r => { rutinaMap[r.clase_id] = r; });

    // Si hay varias clases, mostrar selector
    let claseActivaRutina = clasesHoy[0].id;

    function renderRutina(claseId) {
      const clase = clasesHoy.find(c => c.id === claseId);
      const rutina = rutinaMap[claseId];
      const hora = new Date(clase.fecha_hora).toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit', hour12:false });

      let html = '';

      // Selector si hay más de una clase
      if (clasesHoy.length > 1) {
        html += '<div class="rutina-clase-selector">';
        clasesHoy.forEach(c => {
          const h = new Date(c.fecha_hora).toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit', hour12:false });
          html += `<button class="rutina-clase-btn ${c.id === claseId ? 'active' : ''}" onclick="(function(){ claseActivaRutina='${c.id}'; renderRutina('${c.id}'); })()">${h} ${c.nombre}</button>`;
        });
        html += '</div>';
      }

      html += `<div class="rutina-clase-titulo">🕐 ${hora} · ${clase.nombre}</div>`;

      if (!rutina) {
        html += `<div class="sin-rutina" style="padding:8px 0"><span class="icon" style="font-size:24px;margin-bottom:4px">🌸</span>La profesora aún no ha publicado la rutina.</div>`;
        contenedor.innerHTML = html;
        return;
      }

      const secciones = [
        { id:'descripcion',     emoji:'📝', label:'Descripción general' },
        { id:'objetivo',        emoji:'🎯', label:'Objetivo del día' },
        { id:'nivel',           emoji:'⭐', label:'Nivel', tipo:'nivel' },
        { id:'calentamiento',   emoji:'🔥', label:'Calentamiento' },
        { id:'parte_principal', emoji:'💪', label:'Parte principal' },
        { id:'posturas',        emoji:'🤸', label:'Posturas / movimientos' },
        { id:'musica',          emoji:'🎵', label:'Música / Playlist', tipo:'link' },
        { id:'enfriamiento',    emoji:'❄️', label:'Enfriamiento' },
        { id:'recomendaciones', emoji:'🧘', label:'Recomendaciones' },
        { id:'referencia_visual', emoji:'📸', label:'Referencia visual', tipo:'link' },
      ];

      secciones.forEach(s => {
        const val = rutina[s.id];
        if (!val) return;
        if (s.tipo === 'nivel') {
          html += `<span class="rutina-nivel">${s.emoji} ${val.charAt(0).toUpperCase() + val.slice(1)}</span>`;
        } else if (s.tipo === 'link') {
          const esLink = val.startsWith('http');
          html += `<div class="rutina-seccion">
            <div class="rutina-seccion-label">${s.emoji} ${s.label}</div>
            <div class="rutina-seccion-valor">${esLink ? `<a href="${val}" target="_blank">${val}</a>` : val}</div>
          </div>`;
        } else {
          html += `<div class="rutina-seccion">
            <div class="rutina-seccion-label">${s.emoji} ${s.label}</div>
            <div class="rutina-seccion-valor">${val}</div>
          </div>`;
        }
      });

      contenedor.innerHTML = html;
    }

    // Hacer renderRutina accesible globalmente para el selector
    window.renderRutina = renderRutina;
    renderRutina(claseActivaRutina);
  }

  async function cargarClasesProfesora(nombreCompleto) {
    const ahora = serverNow();
    const en7dias = new Date(); en7dias.setDate(en7dias.getDate() + 7);
    const { data: clases } = await sb
      .from('clases')
      .select('id, nombre, fecha_hora, profesora, tipo')
      .ilike('profesora', `%${nombreCompleto}%`)
      .gte('fecha_hora', ahora.toISOString())
      .lte('fecha_hora', en7dias.toISOString())
      .order('fecha_hora')
      .limit(5);

    const contenedor = document.getElementById('clases-contenido');
    if (!clases || clases.length === 0) {
      contenedor.innerHTML = `<div class="sin-clases"><span class="icon">📭</span>No tienes clases asignadas esta semana.</div>`;
      return;
    }
    contenedor.innerHTML = clases.map(c => `
      <div class="clase-item">
        <div class="clase-fecha-box">
          <div class="clase-dia">${dia(c.fecha_hora)}</div>
          <div class="clase-mes">${nombreMes(c.fecha_hora)}</div>
        </div>
        <div class="clase-info">
          <div class="clase-nombre">${c.nombre}</div>
          <div class="clase-detalle">${horaMinutos(c.fecha_hora)} · ${c.tipo || ''}</div>
        </div>
      </div>`).join('');
  }

  async function cargarRutinasProfesora(nombreCompleto) {
    const contenedor = document.getElementById('rutina-contenido');
    const ahora = serverNow();
    const en144h = new Date(ahora.getTime() + 144*60*60*1000);

    const { data: clasesHoy } = await sb
      .from('clases')
      .select('id, nombre, fecha_hora')
      .ilike('profesora', `%${nombreCompleto}%`)
      .gte('fecha_hora', ahora.toISOString())
      .lte('fecha_hora', en144h.toISOString())
      .order('fecha_hora');

    if (!clasesHoy || clasesHoy.length === 0) {
      contenedor.innerHTML = `<div class="sin-rutina"><span class="icon">🌸</span>No tienes clases en los próximos 6 días.</div>`;
      return;
    }

    const claseIds = clasesHoy.map(c => c.id);
    const { data: rutinas } = await sb.from('rutinas').select('*').in('clase_id', claseIds);
    const rutinaMap = {};
    (rutinas || []).forEach(r => { rutinaMap[r.clase_id] = r; });

    const secciones = [
      {k:'descripcion',e:'📝',l:'Descripción'},{k:'objetivo',e:'🎯',l:'Objetivo'},
      {k:'nivel',e:'⭐',l:'Nivel'},{k:'calentamiento',e:'🔥',l:'Calentamiento'},
      {k:'parte_principal',e:'💪',l:'Parte principal'},{k:'posturas',e:'🤸',l:'Posturas'},
      {k:'musica',e:'🎵',l:'Música'},{k:'enfriamiento',e:'❄️',l:'Enfriamiento'},
      {k:'recomendaciones',e:'🧘',l:'Recomendaciones'},{k:'referencia_visual',e:'📸',l:'Referencia'},
    ];

    contenedor.innerHTML = clasesHoy.map((c, idx) => {
      const r = rutinaMap[c.id];
      const hora = new Date(c.fecha_hora).toLocaleTimeString('es-CL', {hour:'2-digit',minute:'2-digit',hour12:false});
      const fecha = new Date(c.fecha_hora).toLocaleDateString('es-CL', {weekday:'short',day:'numeric',month:'short'});
      const tieneRutina = !!r;
      const detalle = r ? secciones.filter(s => r[s.k]).map(s => {
        const val = r[s.k];
        const esLink = typeof val === 'string' && val.startsWith('http');
        return `<div style="margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">${s.e} ${s.l}</div>
          <div style="font-size:13px;color:#333;line-height:1.6">${esLink ? `<a href="${val}" target="_blank" style="color:var(--coral)">${val}</a>` : val}</div>
        </div>`;
      }).join('') : '';

      return `<div style="border:1px solid rgba(0,0,0,.08);border-radius:12px;margin-bottom:8px;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fff;cursor:pointer"
             onclick="const d=this.nextElementSibling;d.style.display=d.style.display==='none'?'block':'none'">
          <div>
            <div style="font-size:14px;font-weight:700">${c.nombre}</div>
            <div style="font-size:12px;color:var(--gray);margin-top:2px">${fecha} · ${hora}</div>
          </div>
          <span style="font-size:12px;font-weight:600;color:${tieneRutina ? '#00a86b' : '#ccc'}">${tieneRutina ? '✓ Publicada' : 'Sin rutina'}</span>
        </div>
        <div style="display:${idx===0 ? 'block' : 'none'};padding:14px;background:#f9f9f9;border-top:1px solid rgba(0,0,0,.06)">
          ${tieneRutina ? detalle : '<p style="font-size:13px;color:var(--gray)">Aún no has publicado la rutina para esta clase.<br><a href="profesora.html" style="color:var(--coral);font-weight:600">Agregar desde mi panel →</a></p>'}
        </div>
      </div>`;
    }).join('');
  }

  function adaptarVistaProfesora(u) {
    // Ocultar alertas de plan
    document.getElementById('alerta-sin-plan').style.display = 'none';
    document.getElementById('alerta-pocas').style.display = 'none';

    // Reemplazar card "Tu plan activo" por card de profesora
    const cardPlan = document.querySelector('.col-left .card:first-child');
    if (cardPlan) {
      cardPlan.innerHTML = `
        <div class="card-header">
          <div class="card-titulo">Mi perfil docente</div>
          <div class="card-badge" style="background:rgba(139,106,255,.1);color:var(--purple)">Profesora</div>
        </div>
        <div style="padding:8px 0">
          <div style="font-size:22px;font-weight:700;color:var(--dark);margin-bottom:4px">${(u.nombre||'')} ${(u.apellido||'')}</div>
          <div style="font-size:13px;color:var(--gray);margin-bottom:16px">Instructora Espacio Vuela</div>
          <a href="profesora.html" style="display:inline-block;padding:10px 20px;background:linear-gradient(135deg,var(--coral),var(--magenta));color:#fff;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none">
            Ir a mi panel de clases →
          </a>
        </div>`;
    }

    // Cambiar card "Próximas clases" — ocultar botón Agendar
    const btnAgendar = document.querySelector('[href="agendar.html"]');
    if (btnAgendar) btnAgendar.style.display = 'none';

    // Reemplazar acciones rápidas
    const acciones = document.querySelector('.acciones-grid');
    if (acciones) {
      acciones.innerHTML = `
        <a href="profesora.html" class="accion-btn"><span class="accion-icon">🎓</span><span class="accion-label">Mis clases</span></a>
        <a href="calendario.html" class="accion-btn"><span class="accion-icon">📅</span><span class="accion-label">Calendario</span></a>
        <a href="https://wa.me/56973841513" target="_blank" class="accion-btn"><span class="accion-icon">💬</span><span class="accion-label">WhatsApp</span></a>`;
    }
  }

  init();
</script>
