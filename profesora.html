<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Profesora — Espacio Vuela</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --coral: #ff4e68; --magenta: #ff008d; --cyan: #00c8d4;
      --purple: #8b6aff; --yellow: #fecb29; --dark: #111111;
      --gray: #555; --light: #f5f5f7; --border: rgba(0,0,0,0.08);
    }
    body { font-family: 'Outfit', sans-serif; background: #f7f7f9; color: var(--dark); min-height: 100vh; }

    /* NAV */
    .logo { font-family: 'Dancing Script', cursive; font-size: 26px; color: var(--coral); text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .rol-badge {
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
      background: rgba(139,106,255,.1); color: var(--purple); letter-spacing: 1px; text-transform: uppercase;
    }
    .nav-nombre { font-size: 14px; color: var(--gray); }
    .btn-salir {
      font-size: 13px; color: var(--gray); background: none;
      border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 14px;
      cursor: pointer; font-family: 'Outfit', sans-serif; transition: color .2s, border-color .2s;
    }
    .btn-salir:hover { color: var(--coral); border-color: var(--coral); }

    /* LAYOUT */
    .layout {
      display: grid; grid-template-columns: 340px 1fr;
      max-width: 1200px; margin: 0 auto;
      padding: 28px 24px 60px; gap: 20px;
    }

    /* PANEL IZQUIERDO */
    .panel-clases {}
    .panel-header { margin-bottom: 16px; }
    .panel-header h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .panel-header p { font-size: 13px; color: var(--gray); }

    .tabs { display: flex; gap: 4px; background: #fff; border-radius: 12px; padding: 5px; border: 1px solid var(--border); margin-bottom: 16px; }
    .tab { flex: 1; padding: 8px; border-radius: 9px; border: none; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--gray); background: transparent; transition: all .2s; text-align: center; }
    .tab.active { background: linear-gradient(135deg, var(--coral), var(--magenta)); color: #fff; font-weight: 600; }

    /* CLASE ITEM */
    .clase-item {
      background: #fff; border-radius: 14px; padding: 16px 18px;
      border: 1.5px solid var(--border); margin-bottom: 10px; cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
    }
    .clase-item:hover { border-color: rgba(255,78,104,.3); box-shadow: 0 4px 12px rgba(0,0,0,.06); }
    .clase-item.activa { border-color: var(--coral); background: rgba(255,78,104,.02); }
    .clase-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .clase-hora-badge {
      font-size: 13px; font-weight: 700; color: var(--coral);
      background: rgba(255,78,104,.08); padding: 4px 10px; border-radius: 8px;
    }
    .clase-estado-badge {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
    }
    .estado-en-curso  { background: rgba(0,200,212,.1); color: #007a82; }
    .estado-proxima   { background: rgba(254,203,41,.15); color: #7a5800; }
    .estado-pasada    { background: var(--light); color: var(--gray); }
    .clase-nombre-txt { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .clase-meta-txt   { font-size: 12px; color: var(--gray); display: flex; gap: 10px; }

    .sin-clases-msg { text-align: center; padding: 40px 20px; color: var(--gray); font-size: 14px; }
    .sin-clases-msg .icon { font-size: 36px; display: block; margin-bottom: 10px; }

    /* PANEL DERECHO */
    .panel-lista { }
    .panel-vacio {
      background: #fff; border-radius: 20px; border: 1px solid var(--border);
      padding: 60px 40px; text-align: center; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .panel-vacio .icon { font-size: 48px; margin-bottom: 16px; }
    .panel-vacio p { font-size: 15px; color: var(--gray); }

    .lista-header {
      background: #fff; border-radius: 20px 20px 0 0; padding: 24px 28px 20px;
      border: 1px solid var(--border); border-bottom: none;
    }
    .lista-header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .lista-clase-nombre { font-size: 20px; font-weight: 700; }
    .lista-clase-meta { font-size: 13px; color: var(--gray); display: flex; gap: 14px; margin-top: 4px; flex-wrap: wrap; }

    .lista-stats { display: flex; gap: 10px; }
    .stat-mini {
      background: var(--light); border-radius: 10px; padding: 8px 14px; text-align: center;
    }
    .stat-mini-val { font-size: 20px; font-weight: 700; color: var(--coral); line-height: 1; }
    .stat-mini-lbl { font-size: 10px; color: var(--gray); font-weight: 500; }

    /* TABLA ASISTENCIA */
    .tabla-wrap {
      background: #fff; border-radius: 0 0 20px 20px;
      border: 1px solid var(--border); border-top: 1px solid var(--border);
      overflow: hidden;
    }
    .alumna-row {
      display: grid; grid-template-columns: 1fr auto auto;
      align-items: center; gap: 12px;
      padding: 14px 28px; border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .alumna-row:last-child { border-bottom: none; }
    .alumna-row:hover { background: rgba(0,0,0,.01); }

    .alumna-info .nombre { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .alumna-plan {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
    }
    .plan-ok       { background: rgba(0,200,212,.1); color: #007a82; }
    .plan-low      { background: rgba(254,203,41,.15); color: #7a5800; }
    .plan-sin      { background: rgba(255,78,104,.1); color: var(--coral); }
    .plan-ilimitado{ background: rgba(139,106,255,.1); color: var(--purple); }

    .alumna-clases { font-size: 11px; color: var(--gray); margin-top: 2px; }

    /* TOGGLE ASISTENCIA */
    .toggle-asistencia {
      display: flex; border-radius: 10px; overflow: hidden;
      border: 1.5px solid var(--border); flex-shrink: 0;
    }
    .toggle-btn {
      padding: 7px 14px; border: none; font-family: 'Outfit', sans-serif;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
      background: #fff; color: var(--gray);
    }
    .toggle-btn:first-child { border-right: 1px solid var(--border); }
    .toggle-btn.presente-on  { background: rgba(0,200,212,.1); color: #007a82; }
    .toggle-btn.ausente-on   { background: rgba(255,78,104,.1); color: var(--coral); }
    .toggle-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* SKELETON */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--dark); color: #fff; padding: 12px 22px; border-radius: 12px;
      font-size: 14px; font-weight: 500; z-index: 300; opacity: 0;
      transition: opacity .3s; pointer-events: none; white-space: nowrap;
    }
    .toast.ok      { background: #007a82; }
    .toast.error   { background: var(--coral); }
    .toast.visible { opacity: 1; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; padding: 20px 16px 48px; }
      .panel-vacio { display: none; }
      .nav-nombre { display: none; }
    }

    /* MODAL RUTINA */
    .modal-rutina-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center; padding:16px; }
    .modal-rutina-overlay.open { display:flex; }
    .modal-rutina { background:#fff; border-radius:20px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; padding:32px; }
    .modal-rutina h2 { font-family:'Dancing Script',cursive; font-size:26px; color:var(--coral); margin-bottom:6px; }
    .modal-rutina-sub { font-size:13px; color:var(--gray); margin-bottom:24px; }
    .rutina-campo { margin-bottom:20px; }
    .rutina-campo label { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--dark); margin-bottom:6px; }
    .rutina-campo label .emoji { font-size:16px; }
    .rutina-campo input, .rutina-campo textarea, .rutina-campo select {
      width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:10px;
      font-family:'Outfit',sans-serif; font-size:14px; transition:border .2s; resize:vertical;
    }
    .rutina-campo input:focus, .rutina-campo textarea:focus, .rutina-campo select:focus { outline:none; border-color:var(--coral); }
    .rutina-campo .hint { font-size:11px; color:var(--gray); margin-top:4px; }
    .modal-rutina-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; padding-top:16px; border-top:1px solid var(--border); }
    .btn-rutina-card { font-size:11px; font-weight:700; padding:4px 10px; border-radius:6px; background:rgba(139,106,255,.1); color:var(--purple); border:none; cursor:pointer; margin-top:8px; }
    .btn-rutina-card:hover { background:rgba(139,106,255,.2); }
    .rutina-guardada { font-size:11px; color:#00a86b; font-weight:600; }
</style>
</head>
<body>


<div class="layout">

  <!-- PANEL IZQUIERDO: lista de clases -->
  <div class="panel-clases">
    <div class="panel-header">
      <h2 id="panel-titulo">Mis clases</h2>
      <p id="panel-fecha">Cargando...</p>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="hoy">Hoy</button>
      <button class="tab" data-tab="semana">Esta semana</button>
      <button class="tab" data-tab="rutinas">📋 Rutinas</button>
    </div>
    <div id="lista-clases">
      <div class="skeleton" style="height:80px; border-radius:14px; margin-bottom:10px;"></div>
      <div class="skeleton" style="height:80px; border-radius:14px; margin-bottom:10px;"></div>
    </div>
  </div>

  <!-- PANEL DERECHO: lista de asistencia -->
  <div class="panel-lista">
    <div class="panel-vacio" id="panel-vacio">
      <div class="icon">👈</div>
      <p>Selecciona una clase para ver<br>la lista de asistencia</p>
    </div>
    <div id="panel-asistencia" style="display:none;">
      <div class="lista-header">
        <div class="lista-header-top">
          <div>
            <div class="lista-clase-nombre" id="lista-nombre">—</div>
            <div class="lista-clase-meta" id="lista-meta"></div>
          </div>
          <div class="lista-stats">
            <div class="stat-mini">
              <div class="stat-mini-val" id="stat-presentes">0</div>
              <div class="stat-mini-lbl">Presentes</div>
            </div>
            <div class="stat-mini">
              <div class="stat-mini-val" id="stat-total">0</div>
              <div class="stat-mini-lbl">Inscritas</div>
            </div>
          </div>
        </div>
      </div>
      <div class="tabla-wrap" id="tabla-asistencia"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://mcmdsntnbgsmdraeitgt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_dBivnUgV8EeaoSH9EJVQPQ_d692xRQq';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── ESTADO ────────────────────────────────────────────────────
  let userId       = null;
  let usuarioNombre = '';
  let usuarioRol   = '';
  let todasLasClases = [];
  let claseActivaId  = null;
  let tabActiva      = 'hoy';

  // ── UTILS ─────────────────────────────────────────────────────
  function horaStr(ts)  { return new Date(ts).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false }); }
  function fechaCorta(ts) { return new Date(ts).toLocaleDateString('es-CL', { weekday: 'short', day: 'numeric', month: 'short' }); }
  function estadoClase(fechaHora, durMin) {
    const inicio = new Date(fechaHora);
    const fin    = new Date(inicio.getTime() + (durMin || 60) * 60000);
    const ahora  = new Date();
    if (ahora >= inicio && ahora <= fin) return { label: 'En curso', clase: 'estado-en-curso' };
    if (ahora < inicio)                  return { label: 'Próxima',  clase: 'estado-proxima' };
    return { label: 'Pasada', clase: 'estado-pasada' };
  }

  function mostrarToast(msg, tipo = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${tipo} visible`;
    setTimeout(() => t.classList.remove('visible'), 2500);
  }

  // ── INIT ──────────────────────────────────────────────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    userId = session.user.id;

    const { data: u } = await sb.from('usuarios').select('nombre, apellido, rol').eq('id', userId).single();
    if (!u || !['profesora', 'admin'].includes(u.rol)) {
      window.location.href = 'mi-cuenta.html'; return;
    }

    usuarioNombre = `${u.nombre || ''} ${u.apellido || ''}`.trim();
    usuarioRol    = u.rol;

    const elNombre = document.getElementById('nav-nombre'); if(elNombre) elNombre.textContent = usuarioNombre;
    const elRol = document.getElementById('nav-rol'); if(elRol) elRol.textContent = u.rol === 'admin' ? 'Admin' : 'Profesora';
    document.getElementById('panel-fecha').textContent =
      new Date().toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' });

    await cargarClases();
  }

  // ── CARGAR CLASES ─────────────────────────────────────────────
  async function cargarClases() {
    const hoyInicio = new Date(); hoyInicio.setHours(0,0,0,0);
    const hoyFin    = new Date(); hoyFin.setHours(23,59,59,999);
    const semanaFin = new Date(); semanaFin.setDate(semanaFin.getDate() + 7);

    // Admin ve todas las clases; profesora solo las suyas
    let query = sb.from('clases').select('*').order('fecha_hora', { ascending: true });
    if (usuarioRol !== 'admin') {
      query = query.ilike('profesora', `%${usuarioNombre}%`);
    }

    const { data: clases } = await query
      .gte('fecha_hora', hoyInicio.toISOString())
      .lte('fecha_hora', semanaFin.toISOString());

    todasLasClases = clases || [];
    renderClases();
    marcarRutinasExistentes();
  }

  function renderClases() {
    const hoyInicio = new Date(); hoyInicio.setHours(0,0,0,0);
    const hoyFin    = new Date(); hoyFin.setHours(23,59,59,999);

    const filtradas = todasLasClases.filter(c => {
      const f = new Date(c.fecha_hora);
      if (tabActiva === 'rutinas') return true; // rutinas tiene su propio render
      if (tabActiva === 'hoy') return f >= hoyInicio && f <= hoyFin;
      return true;
    });

    const contenedor = document.getElementById('lista-clases');
    if (filtradas.length === 0) {
      contenedor.innerHTML = `<div class="sin-clases-msg"><span class="icon">📭</span>${tabActiva === 'hoy' ? 'No tienes clases hoy.' : 'No hay clases esta semana.'}</div>`;
      return;
    }

    contenedor.innerHTML = filtradas.map(c => {
      const est  = estadoClase(c.fecha_hora, c.duracion_minutos);
      const cupo = c.cupo_disponible ?? 0;
      const max  = c.cupo_maximo ?? 15;
      const inscritas = max - cupo;
      return `
        <div class="clase-item ${claseActivaId === c.id ? 'activa' : ''}" onclick="seleccionarClase('${c.id}')">
          <div class="clase-item-top">
            <span class="clase-hora-badge">${horaStr(c.fecha_hora)}</span>
            <span class="clase-estado-badge ${est.clase}">${est.label}</span>
          </div>
          <div class="clase-nombre-txt">${c.nombre}</div>
          <div class="clase-meta-txt">
            <span>👩‍🏫 ${c.profesora}</span>
            <span>👥 ${inscritas}/${max} inscritas</span>
            ${tabActiva === 'semana' ? `<span>📅 ${fechaCorta(c.fecha_hora)}</span>` : ''}
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:6px;">
            <button class="btn-rutina-card" onclick="event.stopPropagation(); abrirModalRutina('${c.id}', '${c.nombre}')">📋 Rutina</button>
            <span class="rutina-guardada" id="rutina-badge-${c.id}" style="display:none">✓ Rutina cargada</span>
          </div>
        </div>`;
    }).join('');
  }

  // ── TABS ──────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      tabActiva = btn.dataset.tab;
      if (tabActiva === 'rutinas') {
        renderRutinasProf();
      } else {
        renderClases();
        marcarRutinasExistentes();
      }
    });
  });

  // ── SELECCIONAR CLASE ─────────────────────────────────────────
  async function seleccionarClase(claseId) {
    claseActivaId = claseId;
    renderClases(); // Actualiza el highlight

    const clase = todasLasClases.find(c => c.id === claseId);
    if (!clase) return;

    document.getElementById('panel-vacio').style.display = 'none';
    document.getElementById('panel-asistencia').style.display = 'block';
    document.getElementById('lista-nombre').textContent = clase.nombre;
    document.getElementById('lista-meta').innerHTML = `
      <span>📅 ${fechaCorta(clase.fecha_hora)}</span>
      <span>🕐 ${horaStr(clase.fecha_hora)} · ${clase.duracion_minutos || 60} min</span>
      <span>👩‍🏫 ${clase.profesora}</span>`;

    document.getElementById('tabla-asistencia').innerHTML =
      `<div style="padding:20px 28px;"><div class="skeleton" style="height:50px;margin-bottom:10px;"></div><div class="skeleton" style="height:50px;margin-bottom:10px;"></div></div>`;
    document.getElementById('stat-presentes').textContent = '—';
    document.getElementById('stat-total').textContent = '—';

    await cargarAsistencia(claseId);
  }

  // ── CARGAR ASISTENCIA ─────────────────────────────────────────
  async function cargarAsistencia(claseId) {
    // Inscripciones confirmadas con datos de usuaria
    const { data: inscripciones } = await sb
      .from('inscripciones')
      .select('alumna_id, usuarios(nombre, apellido)')
      .eq('clase_id', claseId)
      .eq('estado', 'confirmada');

    // Asistencias ya registradas
    const { data: asistencias } = await sb
      .from('asistencias')
      .select('alumna_id, presente')
      .eq('clase_id', claseId);

    const asistenciaMap = new Map((asistencias || []).map(a => [a.alumna_id, a.presente]));

    if (!inscripciones || inscripciones.length === 0) {
      document.getElementById('tabla-asistencia').innerHTML =
        `<div style="padding:28px; text-align:center; color:var(--gray); font-size:14px;">No hay alumnas inscritas en esta clase.</div>`;
      document.getElementById('stat-total').textContent = '0';
      document.getElementById('stat-presentes').textContent = '0';
      return;
    }

    // Cargar planes activos de cada alumna
    const alumnaIds = inscripciones.map(i => i.alumna_id);
    const hoy = new Date().toISOString().split('T')[0];
    const { data: compras } = await sb
      .from('compras')
      .select('alumna_id, clases_disponibles, ilimitado, addon_gym, planes(nombre, tipo)')
      .in('alumna_id', alumnaIds)
      .eq('estado', 'activo')
      .gte('fecha_fin', hoy);

    // Mapear compra activa por alumna (la más reciente)
    const compraMap = new Map();
    (compras || []).forEach(c => {
      if (!compraMap.has(c.alumna_id)) compraMap.set(c.alumna_id, c);
    });

    const clase = todasLasClases.find(c => c.id === claseId);
    const restriccion = clase?.restriccion_plan || 'libre';

    // Calcular presentes
    let presentes = 0;
    asistencias?.forEach(a => { if (a.presente) presentes++; });
    document.getElementById('stat-total').textContent = inscripciones.length;
    document.getElementById('stat-presentes').textContent = presentes;

    // Render tabla
    document.getElementById('tabla-asistencia').innerHTML = inscripciones.map(ins => {
      const u      = ins.usuarios;
      const nombre = u ? `${u.nombre || ''} ${u.apellido || ''}`.trim() : 'Alumna';
      const compra = compraMap.get(ins.alumna_id);
      const estadoAsistencia = asistenciaMap.get(ins.alumna_id); // true/false/undefined

      // Determinar estado del plan
      let planHtml = '';
      let puedeAsistir = true;
      if (!compra) {
        planHtml = `<span class="alumna-plan plan-sin">⚠️ Sin plan activo</span>`;
        puedeAsistir = false;
      } else {
        const planTipo = compra.planes?.tipo || '';
        const planNombre = compra.planes?.nombre || 'Plan';
        const clasesDis = compra.clases_disponibles;
        const esIlimitado = compra.ilimitado;

        // Verificar restricción
        if (restriccion !== 'libre' && planTipo !== restriccion && !(restriccion === 'gym' && compra.addon_gym)) {
          planHtml = `<span class="alumna-plan plan-sin">❌ Plan no corresponde</span>`;
          puedeAsistir = false;
        } else if (esIlimitado) {
          planHtml = `<span class="alumna-plan plan-ilimitado">∞ ${planNombre}</span>`;
        } else if (clasesDis <= 0) {
          planHtml = `<span class="alumna-plan plan-sin">0 clases — ${planNombre}</span>`;
          puedeAsistir = false;
        } else if (clasesDis <= 2) {
          planHtml = `<span class="alumna-plan plan-low">⚠️ ${clasesDis} clase${clasesDis > 1 ? 's' : ''} — ${planNombre}</span>`;
        } else {
          planHtml = `<span class="alumna-plan plan-ok">✓ ${clasesDis} clases — ${planNombre}</span>`;
        }
      }

      const presenteOn = estadoAsistencia === true  ? 'presente-on' : '';
      const ausenteOn  = estadoAsistencia === false ? 'ausente-on'  : '';

      return `
        <div class="alumna-row" id="row-${ins.alumna_id}">
          <div class="alumna-info">
            <div class="nombre">${nombre}</div>
            ${planHtml}
          </div>
          <div class="toggle-asistencia">
            <button class="toggle-btn ${presenteOn}"
              onclick="marcarAsistencia('${ins.alumna_id}', '${claseId}', true)"
              id="btn-p-${ins.alumna_id}">✓ Presente</button>
            <button class="toggle-btn ${ausenteOn}"
              onclick="marcarAsistencia('${ins.alumna_id}', '${claseId}', false)"
              id="btn-a-${ins.alumna_id}">✗ Ausente</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── MARCAR ASISTENCIA ─────────────────────────────────────────
  async function marcarAsistencia(alumnaId, claseId, presente) {
    const btnP = document.getElementById(`btn-p-${alumnaId}`);
    const btnA = document.getElementById(`btn-a-${alumnaId}`);
    btnP.disabled = true; btnA.disabled = true;

    const { data, error } = await sb.rpc('registrar_asistencia', {
      p_alumna_id:    alumnaId,
      p_clase_id:     claseId,
      p_presente:     presente,
      p_registrado_por: userId
    });

    if (error || !data?.ok) {
      mostrarToast('Error al registrar. Intenta de nuevo.', 'error');
      btnP.disabled = false; btnA.disabled = false;
      return;
    }

    // Actualizar UI
    btnP.className = `toggle-btn ${presente ? 'presente-on' : ''}`;
    btnA.className = `toggle-btn ${!presente ? 'ausente-on' : ''}`;
    btnP.disabled = false; btnA.disabled = false;

    mostrarToast(presente ? '✓ Asistencia registrada' : 'Marcada como ausente');

    // Actualizar contador de presentes
    const asistencias = document.querySelectorAll('.toggle-btn.presente-on');
    const cnt = Math.floor(asistencias.length / 2); // cada alumna tiene 2 botones
    // Recontar correctamente
    let presentes = 0;
    document.querySelectorAll('[id^="btn-p-"]').forEach(b => {
      if (b.classList.contains('presente-on')) presentes++;
    });
    document.getElementById('stat-presentes').textContent = presentes;
  }

  // ── CERRAR SESIÓN ─────────────────────────────────────────────

  init();

  // ── VISTA RUTINAS PROFESORA ──────────────────────────────────
  async function renderRutinasProf() {
    const contenedor = document.getElementById('lista-clases');
    contenedor.innerHTML = `<div style="padding:20px;text-align:center;color:var(--gray)">Cargando rutinas...</div>`;

    const ahora = new Date();
    const en144h = new Date(ahora.getTime() + 144*60*60*1000);

    // Clases de la profesora en próximas 144h
    const clasesIds = todasLasClases
      .filter(c => new Date(c.fecha_hora) >= ahora && new Date(c.fecha_hora) <= en144h)
      .map(c => c.id);

    if (!clasesIds.length) {
      contenedor.innerHTML = `<div style="padding:28px;text-align:center;color:var(--gray)"><div style="font-size:32px;margin-bottom:8px">📋</div><p>No tienes clases en los próximos 6 días.</p></div>`;
      return;
    }

    const { data: rutinas } = await sb.from('rutinas').select('*').in('clase_id', clasesIds);
    const rutinaMap = {};
    (rutinas||[]).forEach(r => { rutinaMap[r.clase_id] = r; });

    const secciones = [
      {k:'descripcion',e:'📝',l:'Descripción'},{k:'objetivo',e:'🎯',l:'Objetivo'},
      {k:'nivel',e:'⭐',l:'Nivel'},{k:'calentamiento',e:'🔥',l:'Calentamiento'},
      {k:'parte_principal',e:'💪',l:'Parte principal'},{k:'posturas',e:'🤸',l:'Posturas'},
      {k:'musica',e:'🎵',l:'Música'},{k:'enfriamiento',e:'❄️',l:'Enfriamiento'},
      {k:'recomendaciones',e:'🧘',l:'Recomendaciones'},{k:'referencia_visual',e:'📸',l:'Referencia'},
    ];

    const clases = todasLasClases.filter(c => clasesIds.includes(c.id))
      .sort((a,b) => new Date(a.fecha_hora) - new Date(b.fecha_hora));

    contenedor.innerHTML = clases.map(c => {
      const r = rutinaMap[c.id];
      const hora = new Date(c.fecha_hora).toLocaleTimeString('es-CL', {hour:'2-digit',minute:'2-digit',hour12:false});
      const fecha = fechaCorta(c.fecha_hora);
      const tieneRutina = !!r;
      const detalle = r ? secciones.filter(s => r[s.k]).map(s => {
        const val = r[s.k];
        const esLink = typeof val === 'string' && val.startsWith('http');
        return `<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:var(--gray);margin-bottom:3px">${s.e} ${s.l}</div>
          <div style="font-size:13px;line-height:1.6">${esLink ? `<a href="${val}" target="_blank" style="color:var(--coral)">${val}</a>` : val}</div></div>`;
      }).join('') : '';

      return `<div style="border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fff;cursor:pointer"
             onclick="const d=this.nextElementSibling;d.style.display=d.style.display==='none'?'block':'none'">
          <div>
            <div style="font-size:14px;font-weight:700">${c.nombre}</div>
            <div style="font-size:12px;color:var(--gray);margin-top:2px">${fecha} · ${hora}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${tieneRutina ? '<span style="font-size:11px;color:#00a86b;font-weight:600">✓ Publicada</span>' : '<span style="font-size:11px;color:#ccc">Sin rutina</span>'}
            <button class="btn-rutina-card" onclick="event.stopPropagation();abrirModalRutina('${c.id}','${c.nombre.replace(/'/g,"\'")}')">✏️ Editar</button>
          </div>
        </div>
        <div style="display:none;padding:14px;background:#f9f9f9;border-top:1px solid var(--border)">
          ${tieneRutina ? detalle : '<p style="font-size:13px;color:var(--gray)">Aún no has publicado la rutina. Usa el botón Editar para agregarla.</p>'}
        </div>
      </div>`;
    }).join('');
  }

  // ── RUTINAS ───────────────────────────────────────────────────
  async function abrirModalRutina(claseId, nombreClase) {
    document.getElementById('rutina-clase-id').value = claseId;
    document.getElementById('rutina-clase-nombre').textContent = nombreClase;
    // Limpiar campos
    ['r-descripcion','r-objetivo','r-calentamiento','r-parte-principal',
     'r-posturas','r-musica','r-enfriamiento','r-recomendaciones','r-referencia'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('r-nivel').value = '';

    // Cargar rutina existente si la hay
    const { data: rutina } = await sb.from('rutinas').select('*').eq('clase_id', claseId).maybeSingle();
    if (rutina) {
      document.getElementById('r-descripcion').value    = rutina.descripcion    || '';
      document.getElementById('r-objetivo').value       = rutina.objetivo       || '';
      document.getElementById('r-nivel').value          = rutina.nivel          || '';
      document.getElementById('r-calentamiento').value  = rutina.calentamiento  || '';
      document.getElementById('r-parte-principal').value= rutina.parte_principal|| '';
      document.getElementById('r-posturas').value       = rutina.posturas       || '';
      document.getElementById('r-musica').value         = rutina.musica         || '';
      document.getElementById('r-enfriamiento').value   = rutina.enfriamiento   || '';
      document.getElementById('r-recomendaciones').value= rutina.recomendaciones|| '';
      document.getElementById('r-referencia').value     = rutina.referencia_visual|| '';
    }
    document.getElementById('modal-rutina').classList.add('open');
  }

  function cerrarModalRutina() {
    document.getElementById('modal-rutina').classList.remove('open');
  }

  async function guardarRutina() {
    const claseId = document.getElementById('rutina-clase-id').value;
    const datos = {
      clase_id:        claseId,
      profesora_id:    userId,
      descripcion:     document.getElementById('r-descripcion').value.trim()     || null,
      objetivo:        document.getElementById('r-objetivo').value.trim()        || null,
      nivel:           document.getElementById('r-nivel').value                  || null,
      calentamiento:   document.getElementById('r-calentamiento').value.trim()   || null,
      parte_principal: document.getElementById('r-parte-principal').value.trim() || null,
      posturas:        document.getElementById('r-posturas').value.trim()        || null,
      musica:          document.getElementById('r-musica').value.trim()          || null,
      enfriamiento:    document.getElementById('r-enfriamiento').value.trim()    || null,
      recomendaciones: document.getElementById('r-recomendaciones').value.trim() || null,
      referencia_visual: document.getElementById('r-referencia').value.trim()   || null,
      updated_at:      new Date().toISOString()
    };

    const { error } = await sb.from('rutinas').upsert(datos, { onConflict: 'clase_id' });
    if (error) { toast('Error al guardar rutina', 'error'); return; }

    // Mostrar badge "✓ Rutina cargada" en la card
    const badge = document.getElementById(`rutina-badge-${claseId}`);
    if (badge) badge.style.display = 'inline';

    cerrarModalRutina();
    setTimeout(() => toast('✓ Rutina guardada correctamente'), 100);

    // Cambiar automáticamente a tab Rutinas para que la vea
    setTimeout(() => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      const tabRutinas = document.querySelector('.tab[data-tab="rutinas"]');
      if(tabRutinas) tabRutinas.classList.add('active');
      tabActiva = 'rutinas';
      renderRutinasProf();
    }, 300);
  }

  // Cerrar modal al hacer clic fuera
  document.getElementById('modal-rutina').addEventListener('click', function(e) {
    if (e.target === this) cerrarModalRutina();
  });

  // Marcar rutinas ya cargadas al renderizar
  async function marcarRutinasExistentes() {
    const ids = todasLasClases.map(c => c.id);
    if (!ids.length) return;
    const { data } = await sb.from('rutinas').select('clase_id').in('clase_id', ids);
    (data || []).forEach(r => {
      const badge = document.getElementById(`rutina-badge-${r.clase_id}`);
      if (badge) badge.style.display = 'inline';
    });
  }

</script>

<!-- MODAL RUTINA -->
<div class="modal-rutina-overlay" id="modal-rutina">
  <div class="modal-rutina">
    <h2>Rutina de la clase</h2>
    <div class="modal-rutina-sub" id="rutina-clase-nombre">—</div>
    <input type="hidden" id="rutina-clase-id">

    <div class="rutina-campo">
      <label><span class="emoji">📝</span> Descripción general</label>
      <textarea id="r-descripcion" rows="2" placeholder="Ej: Hoy trabajamos fluidez y conexión con la música..."></textarea>
    </div>
    <div class="rutina-campo">
      <label><span class="emoji">🎯</span> Objetivo del día</label>
      <input type="text" id="r-objetivo" placeholder="Ej: Dominar la inversión básica">
    </div>
    <div class="rutina-campo">
      <label><span class="emoji">⭐</span> Nivel requerido</label>
      <select id="r-nivel">
        <option value="">Sin especificar</option>
        <option value="principiante">Principiante</option>
        <option value="intermedio">Intermedio</option>
        <option value="avanzado">Avanzado</option>
      </select>
    </div>
    <div class="rutina-campo">
      <label><span class="emoji">🔥</span> Calentamiento</label>
      <textarea id="r-calentamiento" rows="2" placeholder="Ej: 10 min movilidad articular, activación de hombros..."></textarea>
    </div>
    <div class="rutina-campo">
      <label><span class="emoji">💪</span> Parte principal</label>
      <textarea id="r-parte-principal" rows="3" placeholder="Ej: Técnica de pole, combinaciones, trucos..."></textarea>
    </div>
    <div class="rutina-campo">
      <label><span class="emoji">🤸</span> Posturas / movimientos a trabajar</label>
      <textarea id="r-posturas" rows="2" placeholder="Ej: Fireman, Body wave, Crucifix..."></textarea>
    </div>
    <div class="rutina-campo">
      <label><span class="emoji">🎵</span> Música / Playlist</label>
      <input type="text" id="r-musica" placeholder="Link de Spotify o nombre de playlist">
      <div class="hint">Puedes pegar un link de Spotify o escribir el nombre</div>
    </div>
    <div class="rutina-campo">
      <label><span class="emoji">❄️</span> Enfriamiento / Vuelta a la calma</label>
      <textarea id="r-enfriamiento" rows="2" placeholder="Ej: 10 min stretching, respiración..."></textarea>
    </div>
    <div class="rutina-campo">
      <label><span class="emoji">🧘</span> Recomendaciones</label>
      <textarea id="r-recomendaciones" rows="2" placeholder="Ej: Trae calcetines, evita comer 1h antes..."></textarea>
    </div>
    <div class="rutina-campo">
      <label><span class="emoji">📸</span> Referencia visual</label>
      <input type="text" id="r-referencia" placeholder="Link de YouTube o imagen de referencia">
    </div>

    <div class="modal-rutina-btns">
      <button class="btn btn-secondary" onclick="cerrarModalRutina()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarRutina()">Guardar rutina</button>
    </div>
  </div>
</div>
</body>
