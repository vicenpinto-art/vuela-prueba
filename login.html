<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi cuenta — Espacio Vuela</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral: #ff4e68;
      --purple: #a183ff;
      --cyan: #00c8d4;
      --yellow: #fecb29;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      padding: 20px 40px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    nav img { height: 44px; }
    .nav-back {
      text-decoration: none; color: rgba(0,0,0,.55);
      font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--coral); }
    .nav-brand {
      font-family: 'Dancing Script', cursive;
      font-size: 28px; color: var(--coral);
      text-decoration: none;
    }

    /* ── LAYOUT ── */
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 40px;
      background: linear-gradient(135deg, rgba(161,131,255,.06) 0%, rgba(0,200,212,.04) 60%, rgba(255,78,104,.04) 100%);
    }

    .auth-card {
      background: #fff;
      border-radius: 28px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 2px 40px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo span {
      font-family: 'Dancing Script', cursive;
      font-size: 38px; color: var(--coral);
    }
    .auth-logo p {
      font-size: 13px; color: rgba(0,0,0,.4);
      margin-top: 2px; letter-spacing: 0.3px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: #f5f5f7;
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1; padding: 10px;
      background: none; border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 600;
      color: rgba(0,0,0,.4);
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active {
      background: #fff;
      color: #111;
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
    }

    /* ── FORMULARIO ── */
    .form-panel { display: none; }
    .form-panel.active { display: block; animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: rgba(0,0,0,.4);
      letter-spacing: 0.5px; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid rgba(0,0,0,.1);
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px; color: #111;
      background: #fff;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--purple); }
    .form-group input::placeholder { color: rgba(0,0,0,.25); }

    .form-group input.input-error { border-color: var(--coral); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--coral);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: transform .2s, box-shadow .2s, background .2s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,78,104,.35);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: .6; cursor: not-allowed;
      transform: none; box-shadow: none;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
      color: rgba(0,0,0,.25); font-size: 12px;
    }
    .divider::before,
    .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(0,0,0,.08);
    }

    .btn-google {
      width: 100%;
      padding: 13px;
      background: #fff;
      border: 1.5px solid rgba(0,0,0,.12);
      border-radius: 100px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 600; color: #333;
      cursor: pointer;
      display: flex; align-items: center;
      justify-content: center; gap: 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .btn-google:hover {
      border-color: rgba(0,0,0,.25);
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .btn-google svg { width: 18px; height: 18px; }

    .forgot-link {
      display: block; text-align: right;
      font-size: 12px; color: var(--purple);
      text-decoration: none; margin-top: -8px; margin-bottom: 16px;
      font-weight: 500;
    }
    .forgot-link:hover { text-decoration: underline; }

    /* ── MENSAJES ── */
    .msg {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px; font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error { background: rgba(255,78,104,.1); color: #c0001a; display: block; }
    .msg.success { background: rgba(0,200,212,.1); color: #006b72; display: block; }

    /* ── PANEL USUARIO LOGUEADO ── */
    .user-panel { display: none; }
    .user-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--coral));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: #fff;
      margin: 0 auto 16px;
    }
    .user-name {
      text-align: center;
      font-size: 20px; font-weight: 700; color: #111;
      margin-bottom: 4px;
    }
    .user-email {
      text-align: center;
      font-size: 13px; color: rgba(0,0,0,.4);
      margin-bottom: 28px;
    }
    .user-actions { display: flex; flex-direction: column; gap: 10px; }
    .btn-secondary {
      width: 100%; padding: 13px;
      background: #f5f5f7; border: none;
      border-radius: 100px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 600; color: #444;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-secondary:hover { background: #ebebef; }

    .btn-logout {
      width: 100%; padding: 13px;
      background: none;
      border: 1.5px solid rgba(0,0,0,.1);
      border-radius: 100px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 600;
      color: rgba(0,0,0,.4);
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-logout:hover { border-color: var(--coral); color: var(--coral); }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      padding: 24px 40px; text-align: center;
      border-top: 1px solid rgba(0,0,0,.06);
    }
    footer p { font-size: 12px; color: #bbb; }

    @media (max-width: 480px) {
      nav { padding: 14px 16px; }
      .auth-card { padding: 32px 24px; border-radius: 20px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-brand">Vuela</a>
  <a href="index.html" class="nav-back">← Volver al inicio</a>
</nav>

<!-- MAIN -->
<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <span>Espacio Vuela</span>
      <p>Solo para mujeres 💜</p>
    </div>

    <!-- Panel: no logueada -->
    <div id="auth-panel">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
        <button class="tab-btn" onclick="switchTab('register')">Crear cuenta</button>
      </div>

      <!-- Mensaje error/éxito -->
      <div class="msg" id="msg"></div>

      <!-- LOGIN -->
      <div class="form-panel active" id="panel-login">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <a href="#" class="forgot-link" onclick="forgotPassword(event)">¿Olvidaste tu contraseña?</a>
        <button class="btn-primary" id="btn-login" onclick="loginEmail()">Entrar</button>
        <div class="divider">o</div>
        <button class="btn-google" onclick="loginGoogle()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuar con Google
        </button>
      </div>

      <!-- REGISTRO -->
      <div class="form-panel" id="panel-register">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="reg-name" placeholder="Tu nombre" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <button class="btn-primary" id="btn-register" onclick="registerEmail()">Crear cuenta</button>
        <div class="divider">o</div>
        <button class="btn-google" onclick="loginGoogle()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuar con Google
        </button>
      </div>
    </div>

    <!-- Panel: logueada -->
    <div class="user-panel" id="user-panel">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-name" id="user-name">Hola!</div>
      <div class="user-email" id="user-email"></div>
      <div class="user-actions">
        <button class="btn-secondary" onclick="window.location.href='index.html'">← Volver al inicio</button>
        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Espacio Vuela — Dr. Luis Middleton 1638, Providencia 💜</p>
</footer>

<!-- ══════════════════════════════════════════════
     FIREBASE — Reemplaza los valores de config
     con los tuyos desde la consola de Firebase
     ══════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    onAuthStateChanged,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    signOut,
    updateProfile,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ─────────────────────────────────────────────
  // ⚠️  REEMPLAZA ESTOS VALORES CON LOS TUYOS
  // (los encuentras en Firebase Console > Configuración del proyecto)
  // ─────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyCE3qm-Fs0hPM_D56K-UlZ9Ka4cXwikA3Q",
    authDomain:        "espacio-vuela-91a84.firebaseapp.com",
    projectId:         "espacio-vuela-91a84",
    storageBucket:     "espacio-vuela-91a84.firebasestorage.app",
    messagingSenderId: "515497928481",
    appId:             "1:515497928481:web:627883d783124ea1f00060",
    measurementId:     "G-K1H2LQYDH5"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  // ── Helpers UI ──────────────────────────────
  function showMsg(text, type = 'error') {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function clearMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
  }
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Un momento…';
    } else {
      btn.disabled = false;
      btn.innerHTML = btnId === 'btn-login' ? 'Entrar' : 'Crear cuenta';
    }
  }

  // ── Estado de sesión ─────────────────────────
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('auth-panel').style.display = 'none';
      document.getElementById('user-panel').style.display = 'block';
      const name = user.displayName || user.email.split('@')[0];
      document.getElementById('user-name').textContent = '¡Hola, ' + name + '! 🩷';
      document.getElementById('user-email').textContent = user.email;
      document.getElementById('user-avatar').textContent = name[0].toUpperCase();
    } else {
      document.getElementById('auth-panel').style.display = 'block';
      document.getElementById('user-panel').style.display = 'none';
    }
  });

  // ── Login con email/contraseña ───────────────
  window.loginEmail = async function() {
    clearMsg();
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { showMsg('Por favor completa todos los campos.'); return; }
    setLoading('btn-login', true);
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      setLoading('btn-login', false);
      showMsg(translateError(e.code));
    }
  };

  // ── Registro ────────────────────────────────
  window.registerEmail = async function() {
    clearMsg();
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    if (!name || !email || !pass) { showMsg('Por favor completa todos los campos.'); return; }
    if (pass.length < 6) { showMsg('La contraseña debe tener al menos 6 caracteres.'); return; }
    setLoading('btn-register', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
    } catch (e) {
      setLoading('btn-register', false);
      showMsg(translateError(e.code));
    }
  };

  // ── Login con Google ─────────────────────────
  window.loginGoogle = async function() {
    clearMsg();
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') showMsg(translateError(e.code));
    }
  };

  // ── Recuperar contraseña ─────────────────────
  window.forgotPassword = async function(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showMsg('Escribe tu correo arriba y luego haz click aquí.'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showMsg('Te enviamos un correo para restablecer tu contraseña 🩷', 'success');
    } catch (e) {
      showMsg(translateError(e.code));
    }
  };

  // ── Cerrar sesión ────────────────────────────
  window.logout = () => signOut(auth);

  // ── Traducción de errores ────────────────────
  function translateError(code) {
    const map = {
      'auth/invalid-email':            'El correo no tiene un formato válido.',
      'auth/user-not-found':           'No encontramos una cuenta con ese correo.',
      'auth/wrong-password':           'Contraseña incorrecta.',
      'auth/invalid-credential':       'Correo o contraseña incorrectos.',
      'auth/email-already-in-use':     'Ya existe una cuenta con ese correo.',
      'auth/weak-password':            'La contraseña es muy débil. Usa al menos 6 caracteres.',
      'auth/too-many-requests':        'Demasiados intentos. Intenta más tarde.',
      'auth/network-request-failed':   'Error de conexión. Revisa tu internet.',
      'auth/popup-blocked':            'Tu navegador bloqueó la ventana de Google. Permite los pop-ups.',
    };
    return map[code] || 'Ocurrió un error inesperado. Intenta de nuevo.';
  }

  // ── Enter en inputs ──────────────────────────
  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.loginEmail();
  });
  document.getElementById('reg-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.registerEmail();
  });
</script>

<script>
  // ── Tabs (puede estar fuera del module) ──────
  window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    document.getElementById('msg').className = 'msg';
  };
</script>

</body>
</html>
