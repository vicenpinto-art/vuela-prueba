<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi cuenta — Espacio Vuela</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --coral: #ff4e68; --purple: #a183ff; --cyan: #00c8d4; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Outfit', sans-serif; background: #fff; color: #111; min-height: 100vh; display: flex; flex-direction: column; }

    nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,0,0,0.08); }
    .nav-back { text-decoration: none; color: rgba(0,0,0,.55); font-size: 14px; font-weight: 500; transition: color .2s; }
    .nav-back:hover { color: var(--coral); }
    .nav-brand { font-family: 'Dancing Script', cursive; font-size: 28px; color: var(--coral); text-decoration: none; }

    .auth-wrapper { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 100px 20px 60px; background: linear-gradient(135deg, rgba(161,131,255,.06) 0%, rgba(0,200,212,.04) 60%, rgba(255,78,104,.04) 100%); }

    .auth-card { background: #fff; border-radius: 28px; padding: 48px 44px; width: 100%; max-width: 480px; box-shadow: 0 2px 40px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04); animation: fadeUp .4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo span { font-family: 'Dancing Script', cursive; font-size: 38px; color: var(--coral); }
    .auth-logo p { font-size: 13px; color: rgba(0,0,0,.4); margin-top: 2px; }

    .tabs { display: flex; background: #f5f5f7; border-radius: 14px; padding: 4px; margin-bottom: 28px; gap: 4px; }
    .tab-btn { flex: 1; padding: 10px; background: none; border: none; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; color: rgba(0,0,0,.4); cursor: pointer; transition: all .2s; }
    .tab-btn.active { background: #fff; color: #111; box-shadow: 0 1px 6px rgba(0,0,0,.1); }

    .form-panel { display: none; }
    .form-panel.active { display: block; animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: rgba(0,0,0,.4); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 13px 16px; border: 1.5px solid rgba(0,0,0,.1); border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 15px; color: #111; background: #fff; outline: none; transition: border-color .2s; appearance: none; }
    .form-group input:focus, .form-group select:focus { border-color: var(--purple); }
    .form-group input::placeholder { color: rgba(0,0,0,.25); }
    .form-group input:disabled { background: #f5f5f7; color: rgba(0,0,0,.4); cursor: not-allowed; }

    .btn-primary { width: 100%; padding: 14px; background: var(--coral); color: #fff; border: none; border-radius: 100px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: transform .2s, box-shadow .2s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,78,104,.35); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: rgba(0,0,0,.25); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(0,0,0,.08); }

    .btn-google { width: 100%; padding: 13px; background: #fff; border: 1.5px solid rgba(0,0,0,.12); border-radius: 100px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; color: #333; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color .2s, box-shadow .2s; }
    .btn-google:hover { border-color: rgba(0,0,0,.25); box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .btn-google svg { width: 18px; height: 18px; }

    .forgot-link { display: block; text-align: right; font-size: 12px; color: var(--purple); text-decoration: none; margin-top: -8px; margin-bottom: 16px; font-weight: 500; }
    .forgot-link:hover { text-decoration: underline; }

    .msg { padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 500; margin-bottom: 16px; display: none; }
    .msg.error { background: rgba(255,78,104,.1); color: #c0001a; display: block; }
    .msg.success { background: rgba(0,200,212,.1); color: #006b72; display: block; }

    /* ── PANEL USUARIO ── */
    .user-panel { display: none; }

    .profile-header { text-align: center; margin-bottom: 28px; }
    .avatar-wrap { position: relative; width: 90px; height: 90px; margin: 0 auto 14px; cursor: pointer; }
    .avatar-wrap:hover .avatar-overlay { opacity: 1; }
    .user-avatar { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), var(--coral)); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #fff; overflow: hidden; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar-overlay { position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,.45); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; font-size: 11px; font-weight: 600; color: #fff; gap: 4px; }
    .avatar-overlay span { font-size: 20px; }
    #foto-input { display: none; }
    .user-name-display { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 3px; }
    .user-email-display { font-size: 13px; color: rgba(0,0,0,.4); }

    /* ── SECCIONES PERFIL ── */
    .edit-section { background: #f9f9fb; border-radius: 16px; padding: 20px; margin-bottom: 14px; }
    .edit-section h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(0,0,0,.35); margin-bottom: 14px; }

    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field-grid .full { grid-column: 1 / 3; }

    .field-item label { display: block; font-size: 11px; font-weight: 600; color: rgba(0,0,0,.35); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 5px; }
    .field-item input, .field-item select { width: 100%; padding: 10px 12px; border: 1.5px solid rgba(0,0,0,.1); border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; color: #111; background: #fff; outline: none; transition: border-color .2s; appearance: none; }
    .field-item input:focus, .field-item select:focus { border-color: var(--purple); }
    .field-item input:disabled { background: #f0f0f3; color: rgba(0,0,0,.4); cursor: not-allowed; }
    .field-item input::placeholder { color: rgba(0,0,0,.22); }

    .edad-badge { display: inline-block; background: rgba(161,131,255,.15); color: #6b4fc8; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 100px; margin-top: 5px; }

    .save-row { margin-top: 16px; display: flex; align-items: center; gap: 12px; }
    .btn-save-full { flex: 1; padding: 12px; background: var(--coral); color: #fff; border: none; border-radius: 100px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .2s, transform .2s; }
    .btn-save-full:hover { opacity: .88; transform: translateY(-1px); }
    .btn-save-full:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .edit-msg { font-size: 12px; font-weight: 500; display: none; }
    .edit-msg.ok  { color: #009980; display: inline; }
    .edit-msg.err { color: var(--coral); display: inline; }

    .btn-secondary { width: 100%; padding: 13px; background: #f5f5f7; border: none; border-radius: 100px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; color: #444; cursor: pointer; transition: background .2s; margin-bottom: 10px; }
    .btn-secondary:hover { background: #ebebef; }
    .btn-logout { width: 100%; padding: 13px; background: none; border: 1.5px solid rgba(0,0,0,.1); border-radius: 100px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; color: rgba(0,0,0,.4); cursor: pointer; transition: border-color .2s, color .2s; }
    .btn-logout:hover { border-color: var(--coral); color: var(--coral); }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { padding: 24px 40px; text-align: center; border-top: 1px solid rgba(0,0,0,.06); }
    footer p { font-size: 12px; color: #bbb; }

    @media (max-width: 480px) {
      nav { padding: 14px 16px; }
      .auth-card { padding: 32px 20px; border-radius: 20px; }
      .field-grid { grid-template-columns: 1fr; }
      .field-grid .full { grid-column: 1; }
    }
  </style>
</head>
<body>

<nav>

        <button class="btn-google" onclick="loginGoogle()">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continuar con Google

      <!-- REGISTRO -->
      <div class="form-panel" id="panel-register">
        <div class="form-group">

          <input type="email" id="reg-email" placeholder="tu@email.com" autocomplete="email">

        <button class="btn-primary" id="btn-register" onclick="registerEmail()">Crear cuenta</button>
        <div class="divider">o</div>
        <button class="btn-google" onclick="loginGoogle()">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continuar con Google
        </button>
      </div>
    </div>

    <!-- Panel: logueada -->
    <div class="user-panel" id="user-panel">

      <div class="profile-header">
        <div class="avatar-wrap" onclick="document.getElementById('foto-input').click()">
          <div class="user-avatar" id="user-avatar-el">?</div>
          <div class="avatar-overlay"><span>📷</span>Cambiar foto</div>
        </div>
        <input type="file" id="foto-input" accept="image/*">
        <div class="user-name-display" id="user-name-display">—</div>
        <div class="user-email-display" id="user-email-display">—</div>
      </div>

      <!-- Formulario de perfil -->
      <div class="edit-section">

              <option>Quinta Normal</option><option>Recoleta</option><option>Renca</option>
              <option>San Joaquín</option><option>San Miguel</option><option>San Ramón</option>
              <option>Santiago</option><option>Vitacura</option>
              <option>──────────</option>

              <option>Calera de Tango</option><option>Colina</option><option>El Monte</option>
              <option>Isla de Maipo</option><option>Lampa</option><option>María Pinto</option>
              <option>Melipilla</option><option>Padre Hurtado</option><option>Paine</option>

        </div>
        <div class="save-row">
          <button class="btn-save-full" id="btn-save-perfil" onclick="savePerfil()">Guardar cambios</button>
          <div class="edit-msg" id="msg-perfil"></div>

      <button class="btn-secondary" onclick="window.location.href='index.html'">← Volver al inicio</button>

  </div>
</div>

<footer>
  <p>© 2026 Espacio Vuela — Dr. Luis Middleton 1638, Providencia 💜</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, updateProfile, sendPasswordResetEmail }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCE3qm-Fs0hPM_D56K-UlZ9Ka4cXwikA3Q",
    authDomain:        "espacio-vuela-91a84.firebaseapp.com",
    projectId:         "espacio-vuela-91a84",
    storageBucket:     "espacio-vuela-91a84.firebasestorage.app",
    messagingSenderId: "515497928481",
    appId:             "1:515497928481:web:627883d783124ea1f00060",
    measurementId:     "G-K1H2LQYDH5"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // ── Helpers ────────────────────────────────
  function showMsg(text, type = 'error') {
    const el = document.getElementById('msg');
    el.textContent = text; el.className = 'msg ' + type;
  }
  function clearMsg() { document.getElementById('msg').className = 'msg'; }
  function setLoading(btnId, loading, label) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span> Un momento…' : label;
  }

  // ── Calcular edad ───────────────────────────
  window.calcularEdad = function() {
    const val = document.getElementById('edit-nacimiento').value;
    if (!val) { document.getElementById('edit-edad').value = ''; return; }
    const hoy   = new Date();
    const nac   = new Date(val);
    let edad    = hoy.getFullYear() - nac.getFullYear();
    const mes   = hoy.getMonth() - nac.getMonth();
    if (mes < 0 || (mes === 0 && hoy.getDate() < nac.getDate())) edad--;
    document.getElementById('edit-edad').value = edad + ' años';
  };

  // ── Cargar perfil ───────────────────────────
  async function loadProfile(user) {
    const ref  = doc(db, 'usuarios', user.uid);
    const snap = await getDoc(ref);
    const d    = snap.exists() ? snap.data() : {};

    const name = d.nombre || user.displayName || user.email.split('@')[0];
    const foto = d.foto   || user.photoURL    || null;

    document.getElementById('user-name-display').textContent  = name;
    document.getElementById('user-email-display').textContent = user.email;
    document.getElementById('edit-name').value      = name;
    document.getElementById('edit-email').value     = user.email;
    document.getElementById('edit-telefono').value  = d.telefono  || '';
    document.getElementById('edit-nacimiento').value= d.nacimiento|| '';
    document.getElementById('edit-comuna').value    = d.comuna    || '';
    if (d.nacimiento) calcularEdad();

    const avatarEl = document.getElementById('user-avatar-el');
    avatarEl.innerHTML = foto ? `<img src="${foto}" alt="foto">` : name[0].toUpperCase();
  }

  // ── Estado sesión ───────────────────────────
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('auth-panel').style.display = 'none';
      document.getElementById('user-panel').style.display = 'block';
      await loadProfile(user);
    } else {
      document.getElementById('auth-panel').style.display = 'block';
      document.getElementById('user-panel').style.display = 'none';
    }
  });

  // ── Guardar perfil completo ─────────────────
  window.savePerfil = async function() {
    const user   = auth.currentUser;
    const msgEl  = document.getElementById('msg-perfil');
    const name   = document.getElementById('edit-name').value.trim();
    const tel    = document.getElementById('edit-telefono').value.trim();
    const nac    = document.getElementById('edit-nacimiento').value;
    const comuna = document.getElementById('edit-comuna').value;
    msgEl.className = 'edit-msg';
    if (!name) { msgEl.textContent = 'El nombre no puede estar vacío.'; msgEl.className = 'edit-msg err'; return; }
    document.getElementById('btn-save-perfil').disabled = true;
    document.getElementById('btn-save-perfil').innerHTML = '<span class="spinner"></span> Guardando…';
    try {
      await updateProfile(user, { displayName: name });
      await setDoc(doc(db, 'usuarios', user.uid), { nombre: name, telefono: tel, nacimiento: nac, comuna }, { merge: true });
      document.getElementById('user-name-display').textContent = name;
      const avatarEl = document.getElementById('user-avatar-el');
      if (!avatarEl.querySelector('img')) avatarEl.textContent = name[0].toUpperCase();
      msgEl.textContent = '¡Guardado! 🩷'; msgEl.className = 'edit-msg ok';
    } catch(e) {
      msgEl.textContent = 'Error al guardar.'; msgEl.className = 'edit-msg err';
    }
    document.getElementById('btn-save-perfil').disabled = false;
    document.getElementById('btn-save-perfil').textContent = 'Guardar cambios';
    setTimeout(() => { msgEl.className = 'edit-msg'; }, 3000);
  };

  // ── Foto ────────────────────────────────────
  document.getElementById('foto-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const user = auth.currentUser;
    const comprimida = await comprimirImagen(file, 800, 0.75);
    try {
      await setDoc(doc(db, 'usuarios', user.uid), { foto: comprimida }, { merge: true });
      document.getElementById('user-avatar-el').innerHTML = `<img src="${comprimida}" alt="foto">`;
    } catch(err) { alert('Error al guardar la foto. Intenta de nuevo.'); }
  });

  function comprimirImagen(file, maxSize, calidad) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > h && w > maxSize) { h = h * maxSize / w; w = maxSize; }
          else if (h > maxSize)     { w = w * maxSize / h; h = maxSize; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', calidad));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ── Login email ─────────────────────────────
  window.loginEmail = async function() {
    clearMsg();
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { showMsg('Por favor completa todos los campos.'); return; }
    setLoading('btn-login', true, 'Entrar');
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) { setLoading('btn-login', false, 'Entrar'); showMsg(translateError(e.code)); }
  };

  // ── Registro ────────────────────────────────
  window.registerEmail = async function() {
    clearMsg();
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    if (!name || !email || !pass) { showMsg('Por favor completa todos los campos.'); return; }
    if (pass.length < 6) { showMsg('La contraseña debe tener al menos 6 caracteres.'); return; }
    setLoading('btn-register', true, 'Crear cuenta');
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'usuarios', cred.user.uid), { nombre: name, email });
    } catch (e) { setLoading('btn-register', false, 'Crear cuenta'); showMsg(translateError(e.code)); }
  };

  // ── Google ──────────────────────────────────
  window.loginGoogle = async function() {
    clearMsg();
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      const ref  = doc(db, 'usuarios', user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) await setDoc(ref, { nombre: user.displayName || '', email: user.email, foto: user.photoURL || '' });
    } catch (e) { showMsg(translateError(e.code)); }
  };

  // ── Recuperar contraseña ────────────────────
  window.forgotPassword = async function(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showMsg('Escribe tu correo arriba y luego haz click aquí.'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showMsg('Te enviamos un correo para restablecer tu contraseña 🩷', 'success');
    } catch (e) { showMsg(translateError(e.code)); }
  };

  window.logout = () => signOut(auth);

  function translateError(code) {
    const map = {
      'auth/invalid-email':          'El correo no tiene un formato válido.',
      'auth/user-not-found':         'No encontramos una cuenta con ese correo.',
      'auth/wrong-password':         'Contraseña incorrecta.',
      'auth/invalid-credential':     'Correo o contraseña incorrectos.',
      'auth/email-already-in-use':   'Ya existe una cuenta con ese correo.',
      'auth/weak-password':          'La contraseña es muy débil. Usa al menos 6 caracteres.',
      'auth/too-many-requests':      'Demasiados intentos. Intenta más tarde.',
      'auth/network-request-failed': 'Error de conexión. Revisa tu internet.',
      'auth/popup-blocked':          'Tu navegador bloqueó la ventana de Google. Permite los pop-ups.',
    };
    return map[code] || 'Ocurrió un error inesperado. Intenta de nuevo.';
  }

  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') window.loginEmail(); });
  document.getElementById('reg-pass').addEventListener('keydown',   e => { if (e.key === 'Enter') window.registerEmail(); });
</script>

<script>
  window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    document.getElementById('msg').className = 'msg';
  };
</script>
