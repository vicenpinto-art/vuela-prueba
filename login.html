<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Espacio Vuela</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coral: #ff4e68;
      --magenta: #ff008d;
      --cyan: #00c8d4;
      --purple: #8b6aff;
      --dark: #111111;
      --gray: #555;
      --light: #f5f5f7;
      --border: rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #ffffff;
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 28px;
      color: var(--coral);
      text-decoration: none;
    }

    .page {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 65px);
    }

    .left {
      background: linear-gradient(145deg, #fff 0%, rgba(0,200,212,.04) 50%, rgba(255,78,104,.04) 100%);
      padding: 60px 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .left-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--coral);
      margin-bottom: 16px;
    }
    .left h1 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(36px, 4vw, 56px);
      line-height: 1.1;
      margin-bottom: 20px;
    }
    .left h1 span {
      background: linear-gradient(135deg, var(--coral), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .left p {
      font-size: 16px;
      color: rgba(0,0,0,.5);
      line-height: 1.7;
      max-width: 380px;
    }

    .right {
      padding: 60px 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-left: 1px solid var(--border);
    }

    .form-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .form-subtitle { font-size: 14px; color: var(--gray); margin-bottom: 40px; }
    .form-subtitle a { color: var(--coral); text-decoration: none; font-weight: 500; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 13px; font-weight: 500; color: #444; }
    input {
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--dark);
      background: #fff;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(255,78,104,.08);
    }
    input::placeholder { color: #bbb; }

    .forgot {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 8px;
    }
    .forgot a {
      font-size: 12px;
      color: var(--gray);
      text-decoration: none;
    }
    .forgot a:hover { color: var(--coral); }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--coral), var(--magenta));
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: transform .2s, box-shadow .2s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,78,104,.35);
    }
    .btn-primary:disabled {
      opacity: .6; cursor: not-allowed; transform: none; box-shadow: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #ccc;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .registro-link {
      text-align: center;
      font-size: 14px;
      color: var(--gray);
    }
    .registro-link a {
      color: var(--coral);
      text-decoration: none;
      font-weight: 600;
    }

    .mensaje {
      margin-top: 14px; padding: 12px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 500; display: none;
    }
    .mensaje.error {
      background: rgba(255,78,104,.08); color: var(--coral);
      border: 1px solid rgba(255,78,104,.2); display: block;
    }
    .mensaje.success {
      background: rgba(0,200,212,.08); color: #007a82;
      border: 1px solid rgba(0,200,212,.2); display: block;
    }

    @media (max-width: 768px) {
      .page { grid-template-columns: 1fr; }
      .left { display: none; }
      .right { padding: 40px 24px; }
      nav { padding: 16px 24px; }
    }
</style>
</head>
<body>


<div class="page">

  <div class="left">
    <p class="left-eyebrow">Bienvenida de vuelta</p>
    <h1>Nos alegra <span>verte</span> otra vez</h1>
    <p>Inicia sesión para agendar tus clases, ver la rutina del día y revisar el estado de tu plan.</p>
  </div>

  <div class="right">
    <div class="form-title">Iniciar sesión</div>


    <form id="form-login" autocomplete="off">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.cl" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" required>
      </div>

      <div class="forgot">
        <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
      </div>

      <div class="mensaje" id="mensaje"></div>

      <button type="submit" class="btn-primary" id="btn-login">
        Iniciar sesión →
      </button>
    </form>


  </div>
</div>

<script>
  const SUPABASE_URL = 'https://mcmdsntnbgsmdraeitgt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_dBivnUgV8EeaoSH9EJVQPQ_d692xRQq';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const form = document.getElementById('form-login');
  const btn = document.getElementById('btn-login');
  const msg = document.getElementById('mensaje');

  function mostrar(texto, tipo) {
    msg.textContent = texto;
    msg.className = 'mensaje ' + tipo;
  }

  // Si ya está logueada, redirigir directo
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const { data: u } = await sb.from('usuarios').select('rol').eq('id', session.user.id).single();
      if (u?.rol === 'admin') window.location.href = 'admin.html';
      else if (u?.rol === 'profesora') window.location.href = 'profesora.html';
      else window.location.href = 'mi-cuenta.html';
    }
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Ingresando...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      const msg = error.message || '';
      if (msg.includes('Invalid login') || msg.includes('invalid_credentials')) {
        mostrar('Correo o contraseña incorrectos.', 'error');
      } else if (msg.includes('Email not confirmed')) {
        mostrar('Confirma tu email antes de iniciar sesión.', 'error');
      } else {
        mostrar('Error al iniciar sesión: ' + msg, 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión →';
      return;
    }

    // Obtener rol del usuario
    const { data: usuario } = await sb.from('usuarios').select('rol').eq('id', data.user.id).single();

    if (usuario?.rol === 'admin') {
      window.location.href = 'admin.html';
    } else if (usuario?.rol === 'profesora') {
      window.location.href = 'profesora.html';
    } else {
      window.location.href = 'mi-cuenta.html';
    }
  });
</script>

</body>
</html>
